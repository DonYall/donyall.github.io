<!DOCTYPE html>
<html>
  <head>
    <title>Math Past Papers</title>
  </head>
  <body>
    <h1>Math Past Papers</h1>
    <ul id="paper-list"></ul>
    
    <script>
      fetch("https://api.github.com/repos/DonYall/Math-Past-Papers/contents")
        .then(response => response.json())
        .then(data => {
          const paperList = document.getElementById("paper-list");
          data.forEach(item => {
            if (item.type === "file" && item.name.endsWith(".pdf")) {
              const li = document.createElement("li");
              const a = document.createElement("a");
              a.href = item.html_url;
              a.innerText = item.name;
              li.appendChild(a);
              paperList.appendChild(li);
            } else if (item.type === "dir") {
              fetch(item.url)
                .then(response => response.json())
                .then(dirData => {
                  dirData.forEach(dirItem => {
                    if (dirItem.type === "file" && dirItem.name.endsWith(".pdf")) {
                      const li = document.createElement("li");
                      const a = document.createElement("a");
                      a.href = dirItem.html_url;
                      a.innerText = dirItem.name;
                      li.appendChild(a);
                      paperList.appendChild(li);
                    }
                  });
                });
            }
          });
        });
    </script>
  </body>
