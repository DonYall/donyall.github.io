<!DOCTYPE html>
<html>
<head>
  <title>Math Past Papers</title>
</head>
<body>
  <h1>Math Past Papers</h1>
  <ul id="pdf_list">
  </ul>
  <script>
    const apiUrl = "https://api.github.com/repos/DonYall/Math-Past-Papers/contents/";
    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        const pdfs = data.filter(file => file.name.endsWith(".pdf"));
        const pdfList = document.getElementById("pdf_list");
        pdfs.forEach((pdf, index) => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="#" onclick="document.getElementById('pdf_preview_${index}').style.display='block'">${pdf.name}</a>
          <div id="pdf_preview_${index}" style="display:none">
            <object data="${pdf.download_url}" type="application/pdf" width="100%" height="800px">
            </object>
          </div>`;
          pdfList.appendChild(li);
        });
      });
  </script>
</body>
</html>
